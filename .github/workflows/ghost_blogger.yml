name: Ghost Blogger

on:
  workflow_dispatch: {}
  schedule:
    # Daily at 09:15 UTC (adjust as desired)
    - cron: "15 9 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  write-post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent
        working-directory: ghost_blogger_agent
        run: |
          set -euxo pipefail
          python -m pip install -U pip
          pip install -e .

      - name: Run agent
        working-directory: ghost_blogger_agent
        run: |
          set -euxo pipefail
          python -m ghost_blogger run --config config.yaml

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "ghost: new learning-log post"
          title: "ghost: new learning-log post"
          body: "Automated reading log generated by the GitHub-native ghost blogger agent."
          branch: "codex/ghost-blogger"
          delete-branch: true
