name: Ghost Blogger

on:
  workflow_dispatch: {}
  push:
    branches: ["main"]
    paths:
      - "ghost_blogger_agent/**"
      - "knowjoby-blog/**"
      - ".github/workflows/ghost_blogger.yml"
  schedule:
    # Daily at 09:15 UTC (adjust as desired)
    - cron: "15 9 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  write-post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show revision
        run: |
          set -euxo pipefail
          git rev-parse HEAD
          sed -n '1,20p' ghost_blogger_agent/src/ghost_blogger/llm/template.py

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent
        working-directory: ghost_blogger_agent
        run: |
          set -euxo pipefail
          python -m pip install -U pip
          pip uninstall -y ghost-blogger-agent || true
          pip install --no-cache-dir -e .
          python -c "import ghost_blogger; import ghost_blogger.llm.template; print(ghost_blogger.__file__); print(ghost_blogger.llm.template.__file__)"

      - name: Run agent
        working-directory: ghost_blogger_agent
        run: |
          set -euxo pipefail
          python -m ghost_blogger run --config config.yaml

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "ghost: new learning-log post"
          title: "ghost: new learning-log post"
          body: "Automated reading log generated by the GitHub-native ghost blogger agent."
          branch: "codex/ghost-blogger"
          delete-branch: true
