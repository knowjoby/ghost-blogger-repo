name: Ghost Blogger

on:
  workflow_dispatch: {}
  push:
    branches: ["main"]
    paths:
      - "ghost_blogger_agent/**"
      - ".github/workflows/ghost_blogger.yml"
  schedule:
    # Every 15 minutes (UTC). GitHub schedules are best-effort.
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: ghost-blogger
  cancel-in-progress: false

jobs:
  write-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent
        working-directory: ghost_blogger_agent
        run: |
          set -euxo pipefail
          python -m pip install -U pip
          pip uninstall -y ghost-blogger-agent || true
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir -e . --no-deps

      - name: Run agent
        working-directory: ghost_blogger_agent
        run: |
          set -euxo pipefail
          python -m ghost_blogger run --config config.yaml

      - name: Commit and push post
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add knowjoby-blog/_posts ghost_blogger_agent/data/state.json knowjoby-blog/_data/
          if git diff --cached --quiet; then
            echo "No new post to commit."
            exit 0
          fi
          git commit -m "ghost: new learning-log post"
          git push
