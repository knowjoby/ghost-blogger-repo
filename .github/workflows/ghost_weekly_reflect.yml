name: Ghost Weekly Reflect

on:
  schedule:
    - cron: "0 8 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ghost-weekly-reflect
  cancel-in-progress: false

jobs:
  reflect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent
        working-directory: ghost_blogger_agent
        run: |
          set -euxo pipefail
          python -m pip install -U pip
          pip uninstall -y ghost-blogger-agent || true
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir -e . --no-deps

      - name: Run reflector
        working-directory: ghost_blogger_agent
        run: |
          set -euxo pipefail
          python -m ghost_blogger reflect --config config.yaml

      - name: Commit weekly reflection post and memory
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add knowjoby-blog/_posts knowjoby-blog/_data/memory.json
          if git diff --cached --quiet; then
            echo "No reflection post to commit."
            exit 0
          fi
          git commit -m "ghost: weekly reflection post"
          git push
