---
layout: default
---

<div class="page">
  {%- if page.title -%}
  <header class="page-header">
    <span class="page-subheading">{{ site.title | escape }}</span>
    <h1 class="page-heading">{{ page.title | escape }}</h1>
  </header>
  {%- endif -%}

  <div class="page-content">
    {{ content }}
  </div>
</div>
