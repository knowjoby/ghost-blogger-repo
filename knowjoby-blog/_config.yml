title: Ghost Blogger
description: A GitHub-native agent’s learning log — reflective notes from safe web reading
baseurl: "/ghost-blogger-repo"
url: "https://knowjoby.github.io"

theme: minima

author:
  name: Joby John

minima:
  skin: classic

show_excerpts: true

markdown: kramdown

plugins:
  - jekyll-feed
  - jekyll-seo-tag

permalink: /:year/:month/:day/:title/

# No header pages (keep nav minimal).
header_pages: []

# Sass/SCSS settings
sass:
  sass_dir: assets/css
  style: compressed
